name: Release
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-artifacts:
    name: build / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: joy
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: joy
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            archive_ext: zip
            binary_name: joy.exe
    steps:
      - uses: actions/checkout@v4

      - name: Validate release ref is a version tag
        shell: bash
        run: |
          set -euo pipefail
          case "${GITHUB_REF}" in
            refs/tags/v*) ;;
            *)
              echo "Release workflow must run from a v* tag ref (push tag or manually dispatch on a tag)." >&2
              exit 1
              ;;
          esac

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (Windows GNU)
        if: runner.os == 'Windows'
        run: |
          choco install mingw --version=12.2.0 -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release/${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --workspace

      - name: Compute artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_BASE="joy-v${VERSION}-${{ matrix.target }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "archive_base=${ARCHIVE_BASE}" >> "$GITHUB_OUTPUT"

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/joy"
          cp README.md dist/README.md
          tar -C dist -czf "${{ steps.meta.outputs.archive_base }}.tar.gz" joy README.md
          shasum -a 256 "${{ steps.meta.outputs.archive_base }}.tar.gz" | awk '{print $1}' > "${{ steps.meta.outputs.archive_base }}.sha256"
          rm -rf dist

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveBase = "${{ steps.meta.outputs.archive_base }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/joy.exe"
          Copy-Item "README.md" "dist/README.md"
          Compress-Archive -Path dist\joy.exe,dist\README.md -DestinationPath "$archiveBase.zip" -Force
          (Get-FileHash "$archiveBase.zip" -Algorithm SHA256).Hash.ToLower() | Out-File "$archiveBase.sha256" -Encoding ascii -NoNewline
          Remove-Item -Recurse -Force dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ steps.meta.outputs.archive_base }}.${{ matrix.archive_ext }}
            ${{ steps.meta.outputs.archive_base }}.sha256
          if-no-files-found: error

  github-release:
    name: github-release
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
