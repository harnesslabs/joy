name: Docs
concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'book/**'
      - 'docs/**'
      - 'justfile'
      - '.github/workflows/docs.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'README.md'
      - 'book/**'
      - 'docs/**'
      - 'justfile'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-check:
    name: mdbook-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: docs/mdbook-tools

      - name: Install mdBook and linkcheck
        run: |
          cargo install --locked mdbook --version 0.4.43
          cargo install --locked mdbook-linkcheck --version 0.7.7

      - name: Build docs
        run: mdbook build book

      - name: Test docs code blocks
        run: mdbook test book

  deploy-pages:
    name: deploy-pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build-and-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: docs/mdbook-tools

      - name: Install mdBook
        run: cargo install --locked mdbook --version 0.4.43

      - name: Build docs
        run: mdbook build book

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
