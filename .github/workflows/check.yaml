name: Check
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: fmt
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: install taplo
        run: cargo install taplo-cli

      - name: run Rust fmt
        run: cargo fmt --all -- --check

      - name: run TOML fmt
        run: taplo fmt --check

  per-target:
    name: ${{ matrix.job }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - job: build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - job: lint
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - job: build
            os: macos-latest
            target: aarch64-apple-darwin
          - job: lint
            os: macos-latest
            target: aarch64-apple-darwin
          - job: build
            os: windows-latest
            target: x86_64-pc-windows-gnu
          - job: lint
            os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.job == 'lint' && 'clippy' || '' }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw --version=12.2.0 -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/${{ matrix.job }}/${{ matrix.target }}

      - name: Build
        if: matrix.job == 'build'
        run: cargo build --target ${{ matrix.target }} --workspace

      - name: Clippy
        if: matrix.job == 'lint'
        run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features -- --deny warnings

  test:
    name: test / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw --version=12.2.0 -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/test/${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }} --workspace

  compiled-e2e:
    name: compiled-e2e / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw --version=12.2.0 -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install CMake and Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install CMake and Ninja (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/compiled-e2e/${{ matrix.target }}

      - name: Run compiled-dependency focused tests
        run: |
          cargo test --verbose --target ${{ matrix.target }} --workspace --test add_command build_and_run_with_local_compiled_recipe_dependency -- --nocapture
          cargo test --verbose --target ${{ matrix.target }} --workspace --test lockfile_behavior -- --nocapture

  udeps:
    name: udeps / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}
      
      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw --version=12.2.0 -y
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/udeps/${{ matrix.target }}
      
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      
      - name: Check unused dependencies
        run: cargo +nightly udeps --target ${{ matrix.target }} --workspace

  semver:
    name: semver
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Skip semver checks for unpublished crate baseline
        run: |
          echo "Skipping cargo-semver-checks in CI for now."
          echo "Reason: crates.io already has an unrelated crate named 'joy', so the default"
          echo "baseline resolution is not meaningful for this repository and causes false failures."
          echo "Use a repo-local baseline command (see justfile: semver-main) when semver checks are"
          echo "reintroduced as a required CI signal."
