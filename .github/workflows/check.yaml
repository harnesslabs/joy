name: Check
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  recipes:
    name: recipes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/recipes

      - name: Validate bundled recipes
        run: cargo run --quiet -- recipe-check --json

  distribution-metadata:
    name: distribution-metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Homebrew formula syntax
        run: ruby -c Formula/joy.rb

      - name: Validate Scoop manifest JSON
        run: jq empty packaging/scoop/joy.json

  format:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install taplo
        run: cargo install taplo-cli --locked

      - name: Run Rust fmt
        run: cargo fmt --all -- --check

      - name: Run TOML fmt
        run: taplo fmt --check

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/docs/mdbook-tools

      - name: Install mdBook
        run: |
          cargo install --locked mdbook --version 0.5.2

      - name: Build docs
        run: mdbook build book

      - name: Test docs code blocks
        run: mdbook test book

  per-target:
    name: ${{ matrix.job }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - job: build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - job: lint
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - job: build
            os: macos-latest
            target: aarch64-apple-darwin
          - job: lint
            os: macos-latest
            target: aarch64-apple-darwin
          - job: build
            os: windows-latest
            target: x86_64-pc-windows-gnu
          - job: lint
            os: windows-latest
            target: x86_64-pc-windows-gnu
          - job: build
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - job: lint
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: ${{ matrix.job == 'lint' && 'clippy' || '' }}

      - name: Setup MSVC developer environment (Windows MSVC)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-msvc')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install MinGW (Windows GNU)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-gnu')
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install mingw --version=12.2.0 -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "Failed to install mingw after $maxAttempts attempts."
            }
            $delaySeconds = 20 * $attempt
            Write-Host "mingw install attempt $attempt/$maxAttempts failed (exit $LASTEXITCODE). Retrying in ${delaySeconds}s..."
            Start-Sleep -Seconds $delaySeconds
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/${{ matrix.job }}/${{ matrix.target }}

      - name: Build
        if: matrix.job == 'build'
        run: cargo build --target ${{ matrix.target }} --workspace

      - name: Clippy
        if: matrix.job == 'lint'
        run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features -- --deny warnings

  test:
    name: test / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC developer environment (Windows MSVC)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-msvc')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install MinGW (Windows GNU)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-gnu')
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install mingw --version=12.2.0 -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "Failed to install mingw after $maxAttempts attempts."
            }
            $delaySeconds = 20 * $attempt
            Write-Host "mingw install attempt $attempt/$maxAttempts failed (exit $LASTEXITCODE). Retrying in ${delaySeconds}s..."
            Start-Sleep -Seconds $delaySeconds
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/test/${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }} --workspace

  compiled-e2e:
    name: compiled-e2e / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC developer environment (Windows MSVC)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-msvc')
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install MinGW (Windows GNU)
        if: runner.os == 'Windows' && endsWith(matrix.target, '-gnu')
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install mingw --version=12.2.0 -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "Failed to install mingw after $maxAttempts attempts."
            }
            $delaySeconds = 20 * $attempt
            Write-Host "mingw install attempt $attempt/$maxAttempts failed (exit $LASTEXITCODE). Retrying in ${delaySeconds}s..."
            Start-Sleep -Seconds $delaySeconds
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install CMake and Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install CMake and Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Install CMake and Ninja (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install cmake ninja -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "Failed to install CMake/Ninja after $maxAttempts attempts."
            }
            $delaySeconds = 20 * $attempt
            Write-Host "CMake/Ninja install attempt $attempt/$maxAttempts failed (exit $LASTEXITCODE). Retrying in ${delaySeconds}s..."
            Start-Sleep -Seconds $delaySeconds
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/compiled-e2e/${{ matrix.target }}

      - name: Run compiled-dependency focused tests
        run: |
          cargo test --verbose --target ${{ matrix.target }} --workspace --test add_command build_and_run_with_local_compiled_recipe_dependency -- --nocapture
          cargo test --verbose --target ${{ matrix.target }} --workspace --test lockfile_behavior -- --nocapture

  udeps:
    name: udeps / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install mingw --version=12.2.0 -y --no-progress
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "Failed to install mingw after $maxAttempts attempts."
            }
            $delaySeconds = 20 * $attempt
            Write-Host "mingw install attempt $attempt/$maxAttempts failed (exit $LASTEXITCODE). Retrying in ${delaySeconds}s..."
            Start-Sleep -Seconds $delaySeconds
          }
          Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
          refreshenv
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: check/udeps/${{ matrix.target }}

      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked

      - name: Check unused dependencies
        run: cargo +nightly udeps --target ${{ matrix.target }} --workspace

  semver:
    name: semver
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked

      - name: Run semver checks against origin/main baseline
        run: cargo semver-checks check-release --workspace --baseline-rev origin/main
