# Stable-only rustfmt config to keep `cargo fmt --check` quiet in CI and local development.
# Nightly-only options are intentionally excluded.

edition = "2024"
max_width = 100
use_small_heuristics = "Max"
newline_style = "Unix"
use_try_shorthand = true
match_block_trailing_comma = true
use_field_init_shorthand = true
hard_tabs = false
tab_spaces = 2
